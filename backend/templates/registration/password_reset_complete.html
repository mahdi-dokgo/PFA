{% load static %}
<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Mot de passe modifié — ApprovWise</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'webapp/css/custom.css' %}?v=2">
</head>
<body style="background:#f8fafc;min-height:100vh;display:flex;align-items:center;justify-content:center;">
<div style="width:100%;max-width:440px;padding:1rem;">
  <div class="card shadow-sm border-0" style="border-radius:14px;">
    <div class="card-body p-4 p-md-5 text-center">
      <div style="width:52px;height:52px;background:#22c55e;border-radius:12px;display:inline-flex;align-items:center;justify-content:center;margin-bottom:1.25rem;">
        <i class="bi bi-check-circle" style="font-size:22px;color:white;"></i>
      </div>
      <h2 class="h4 fw-bold mb-2">Mot de passe modifié !</h2>
      <p class="text-muted mb-4">
        Votre mot de passe a été réinitialisé avec succès.<br>
        Vous pouvez maintenant vous connecter avec votre nouveau mot de passe.
      </p>
      <a href="{% url 'webapp:login' %}" class="btn btn-primary w-100 py-2 fw-semibold">
        <i class="bi bi-box-arrow-in-right me-1"></i> Se connecter
      </a>
    </div>
  </div>
  <p class="text-center text-muted mt-3" style="font-size:12px;">© 2026 ApprovWise · EMSI Rabat</p>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
