{% load static %}
<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Mot de passe oublié — ApprovWise</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'webapp/css/custom.css' %}?v=2">
</head>
<body style="background:#f8fafc;min-height:100vh;display:flex;align-items:center;justify-content:center;">
<div style="width:100%;max-width:440px;padding:1rem;">
  <div class="card shadow-sm border-0" style="border-radius:14px;">
    <div class="card-body p-4 p-md-5">
      <div class="text-center mb-4">
        <div style="width:52px;height:52px;background:#3b82f6;border-radius:12px;display:inline-flex;align-items:center;justify-content:center;margin-bottom:1rem;">
          <i class="bi bi-lock" style="font-size:22px;color:white;"></i>
        </div>
        <h2 class="h4 fw-bold mb-1">Mot de passe oublié ?</h2>
        <p class="text-muted small mb-0">Renseignez votre adresse e-mail. Vous recevrez un lien pour réinitialiser votre mot de passe.</p>
      </div>

      <form method="post">
        {% csrf_token %}
        <div class="mb-3">
          <label for="id_email" class="form-label fw-semibold">Adresse e-mail</label>
          <input type="email" name="email" id="id_email"
                 class="form-control form-control-lg"
                 placeholder="votre@email.ma" required autofocus>
        </div>
        <button type="submit" class="btn btn-primary w-100 py-2 fw-semibold">
          Envoyer le lien de réinitialisation
        </button>
      </form>

      <div class="text-center mt-4">
        <a href="{% url 'webapp:login' %}" class="text-decoration-none text-muted small">
          <i class="bi bi-arrow-left me-1"></i> Retour à la connexion
        </a>
      </div>
    </div>
  </div>
  <p class="text-center text-muted mt-3" style="font-size:12px;">© 2026 ApprovWise · EMSI Rabat</p>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
